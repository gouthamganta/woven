version: '3.8'

services:
  # ================================
  # PostgreSQL Database
  # ================================
  postgres:
    image: pgvector/pgvector:pg16
    container_name: woven-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-woven}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-woven}
      POSTGRES_DB: ${POSTGRES_DB:-woven}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U woven -d woven"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - woven-network

  # ================================
  # Azurite (Azure Blob Storage emulator — local dev only)
  # ================================
  azurite:
    image: mcr.microsoft.com/azure-storage/azurite:latest
    container_name: woven-azurite
    restart: unless-stopped
    ports:
      - "10000:10000"
    command: azurite-blob --blobHost 0.0.0.0
    networks:
      - woven-network

  # ================================
  # Redis Cache
  # ================================
  redis:
    image: redis:7-alpine
    container_name: woven-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - woven-network

  # ================================
  # Backend API (.NET)
  # ================================
  backend:
    build:
      context: ./backend/WovenBackend
      dockerfile: Dockerfile
    container_name: woven-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=woven;Username=woven;Password=woven
      - Redis__ConnectionString=redis:6379,abortConnect=false
      - Azure__Storage__ConnectionString=DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OcDhPq5LQjZLc8HVjA1yMOHhDFgAnmJJ9bNoWtMBKZKD4V5FZtCt4OGQ==;BlobEndpoint=http://azurite:10000/devstoreaccount1;
      - Jwt__Key=${JWT_KEY:-CHANGE_THIS_TO_A_LONG_RANDOM_SECRET_MIN_32_CHARS_PRODUCTION}
      - Jwt__Issuer=WovenBackend
      - Jwt__Audience=WovenFrontend
      - Jwt__ExpiryMinutes=60
      - GoogleAuth__ClientId=211033152902-umjjk9n5mqd02s97skerf9sn383m0v00.apps.googleusercontent.com
      - OpenAI__ApiKey=${OPENAI_API_KEY}
      - Cors__AllowedOrigins=http://localhost,http://localhost:80,https://prepared-lucia-marc-schools.trycloudflare.com
    ports:
      - "5135:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - woven-network

  # ================================
  # Frontend (Angular + nginx)
  # ================================
  frontend:
    build:
      context: ./frontend/woven-frontend
      dockerfile: Dockerfile
    container_name: woven-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - woven-network

# ================================
# Volumes
# ================================
volumes:
  postgres_data:
    driver: local

# ================================
# Networks
# ================================
networks:
  woven-network:
    driver: bridge
