<!-- ── Splash intro ──────────────────────────────────── -->
<div class="splash">

  <!-- Particle burst canvas — fires at conjunction moment -->
  <canvas #burstCanvas class="burst-canvas"></canvas>

  <!-- Stage 1: ◈ (Magical) and ◇ (Logical) draw in from the edges -->
  <div class="spark-field">
    <span class="diamond diamond-left">◈</span>
    <span class="diamond diamond-right">◇</span>
  </div>

  <!-- Stage 2: Conjunction flash at center -->
  <div class="conjunction"></div>

  <!-- Stage 3: W crystallises from the flash -->
  <div class="w-mark">W</div>

  <!-- Stage 4: Full wordmark — each letter staggers in independently -->
  <div class="wordmark">
    <span>W</span><span>o</span><span>v</span><span>e</span><span>n</span>
  </div>

</div>

<!-- ── Login card ────────────────────────────────────── -->
<div class="login-stage">
  <div class="card">
    <div class="brand">
      <h1 class="logo">Woven</h1>
      <p class="tagline">Energy. Intention. Chemistry.</p>
    </div>
    <div class="divider"></div>
    <div class="action">
      <p class="kicker">Sign in to continue</p>
      <div class="googleWrap">
        <div id="googleBtn"></div>
      </div>
      <div class="state" *ngIf="isLoading">Signing you in…</div>
      <div class="state err" *ngIf="!isLoading && errorMsg">{{ errorMsg }}</div>
    </div>
  </div>
</div>
