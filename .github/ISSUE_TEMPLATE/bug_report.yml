name: Bug Report
description: Something isn't working correctly
labels: ["bug", "needs-triage"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Fill in the details below to help us investigate quickly.

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of the app is affected?
      options:
        - Frontend (Angular)
        - Backend (ASP.NET API)
        - Matchmaking / Deck
        - Chat / Messaging
        - Games (Know Me / Red-Green Flag)
        - Authentication (Google OAuth / JWT)
        - Moments / Balloon flow
        - Infrastructure / Docker
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      placeholder: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
      placeholder: What should have happened instead?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to ...
        2. Click on ...
        3. See error
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: |
        - .NET version: 10.0.x
        - Node version: 22.x
        - Browser: Chrome 124
        - OS: Windows 11 / macOS 14
        - Docker: yes/no
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or screenshots
      description: Paste any error messages, stack traces, or screenshots.
      render: text
