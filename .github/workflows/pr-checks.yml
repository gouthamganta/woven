name: PR Health Checks

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]
    branches: [main, master]

permissions:
  contents: read
  pull-requests: write
  checks: write
  statuses: write

jobs:
  # ── PR title follows Conventional Commits ─────────────────────────────────
  conventional-title:
    name: Conventional Commit title
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            build
            ci
            chore
            revert
          requireScope: false
          subjectPattern: ^.{1,100}$
          subjectPatternError: |
            The PR title should be concise (under 100 characters).

  # ── No secrets accidentally committed ─────────────────────────────────────
  secrets-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for accurate scanning

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Check for large files that shouldn't be committed ─────────────────────
  file-size:
    name: Large file check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for large files (>5MB)
        run: |
          LARGE=$(find . -not -path './.git/*' -size +5M 2>/dev/null | grep -v node_modules | grep -v '.angular' || true)
          if [ -n "$LARGE" ]; then
            echo "❌ Found large files (>5MB):"
            echo "$LARGE"
            echo ""
            echo "Consider using Git LFS for binary assets or adding to .gitignore."
            exit 1
          fi
          echo "✅ No large files found"

  # ── Migration sanity: new migration must have a snapshot change ───────────
  migration-check:
    name: Migration snapshot check
    runs-on: ubuntu-latest
    if: contains(github.event.pull_request.labels.*.name, 'database')

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check migration snapshot consistency
        run: |
          NEW_MIGRATIONS=$(git diff --name-only HEAD~1 HEAD -- 'backend/WovenBackend/Migrations/*.cs' | grep -v Designer | grep -v Snapshot || true)
          SNAPSHOT_CHANGED=$(git diff --name-only HEAD~1 HEAD -- 'backend/WovenBackend/Migrations/*Snapshot.cs' || true)

          if [ -n "$NEW_MIGRATIONS" ] && [ -z "$SNAPSHOT_CHANGED" ]; then
            echo "❌ New migration file detected but WovenDbContextModelSnapshot.cs was not updated."
            echo "Run: dotnet ef migrations add <Name>"
            echo "New migrations: $NEW_MIGRATIONS"
            exit 1
          fi
          echo "✅ Migration snapshot check passed"
