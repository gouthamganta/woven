name: Stale Issues & PRs

on:
  schedule:
    # Run daily at 06:00 UTC
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    name: Mark and close stale items
    runs-on: ubuntu-latest

    steps:
      - uses: actions/stale@v9
        with:
          # Issues
          days-before-issue-stale: 30
          days-before-issue-close: 14
          stale-issue-label: 'stale'
          stale-issue-message: |
            This issue has been inactive for 30 days. It will be closed in 14 days unless there is new activity.
            If this is still relevant, please leave a comment or remove the `stale` label.
          close-issue-message: |
            Closing due to inactivity. Feel free to reopen if this is still relevant.
          close-issue-label: 'closed-stale'
          exempt-issue-labels: 'pinned,security,bug,in-progress'

          # PRs
          days-before-pr-stale: 14
          days-before-pr-close: 7
          stale-pr-label: 'stale'
          stale-pr-message: |
            This PR has been inactive for 14 days. It will be closed in 7 days unless there is new activity.
            Please update the PR or leave a comment if you're still working on it.
          close-pr-message: |
            Closing due to inactivity. Feel free to reopen if you'd like to continue this work.
          close-pr-label: 'closed-stale'
          exempt-pr-labels: 'pinned,in-progress,do-not-close'

          # Don't count bot comments as activity
          ignore-updates: false
          operations-per-run: 100
