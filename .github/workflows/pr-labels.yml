name: PR Labeler & Size

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  # ── Auto-label by changed files ───────────────────────────────────────────
  labeler:
    name: Label by changed files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/labeler@v5
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          configuration-path: .github/labeler.yml
          sync-labels: true

  # ── Label by PR size ──────────────────────────────────────────────────────
  size:
    name: Label by PR size
    runs-on: ubuntu-latest
    steps:
      - uses: codelytv/pr-size-labeler@v1
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          xs_max_size: 10
          s_max_size: 50
          m_max_size: 200
          l_max_size: 500
          fail_if_xl: false
          message_if_xl: |
            This PR is very large (XL). Consider splitting it into smaller PRs for easier review.
            Large PRs take longer to review and are more likely to introduce bugs.
